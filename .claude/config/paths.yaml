    primary: "02 - 📄 案件分析"
    secondary:
      - "04 - 📤 客户提供"
      - "07 - 📥 对方提交"
      - "08 - 🏛️ 法院送达"
      - "09 - 🎯 庭审笔录"

  EvidenceAnalyzer:
    primary: "05 - 📎 证据材料"
    secondary:
      - "07 - 📥 对方提交"

  Scheduler:
    primary: "00 - 📅 日程管理"
    secondary:
      - "08 - 🏛️ 法院送达"

  IssueIdentifier:
    primary: "03 - 🔍 法律研究"

  Researcher:
    primary: "03 - 🔍 法律研究"
    secondary:
      - "11 - 📚 参考文件"

  Strategist:
