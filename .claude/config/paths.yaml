# SuitAgent 路径配置文件
# 🎯 用途：统一管理项目中的关键路径引用
# 📝 更新规则：当文件结构变化时，只需更新此文件，然后运行 /update-paths

# ====================
# 核心规则文件路径
# ====================

rules:
  agent_mapping: .claude/rules/AgentMapping.md
  workflow_system: .claude/rules/WorkflowSystem.md
  workflow_scenarios: .claude/rules/WorkflowScenarios.md
  time_rules: .claude/rules/TimeRules.md
  output_standards: .claude/rules/OutputStandards.md
  rules_meta: .claude/rules/RulesMeta.md
  pdf_processing: .claude/rules/PDFProcessingRules.md
  subagent_standards: .claude/rules/SubagentStandards.md

# ====================
# Agent 输出目录映射
# ====================

agent_directories:
